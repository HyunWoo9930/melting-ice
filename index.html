<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="시간을 정하면 얼음이 천천히 녹는 가벼운 공부 타이머."
    />
    <meta name="theme-color" content="#EDF1F5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="이 얼음이 다 녹기전에" />
    <title>이 얼음이 다 녹기전에</title>
    <link rel="manifest" href="manifest.json?v=20260516-canvas-1" />
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32.png?v=20260516-canvas-1" />
    <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png?v=20260516-canvas-1" />
    <link rel="stylesheet" href="styles.css?v=20260516-canvas-1" />
  </head>
  <body>
    <main class="app" data-state="idle" data-mode="normal">
      <header class="topbar" aria-label="서비스 헤더">
        <a class="brand" href="./" aria-label="이 얼음이 다 녹기전에 홈">이 얼음이 다 녹기전에</a>
        <button class="icon-button" id="fullscreenButton" type="button" aria-label="전체화면">
          <span aria-hidden="true">⛶</span>
        </button>
      </header>

      <section class="timer-shell" aria-label="얼음 공부 타이머">
        <div class="mode-controls" aria-label="온도 조절">
          <div class="mode-buttons">
            <button class="mode-action mode-action-heater" id="heaterButton" type="button" aria-label="히터 켜기" aria-pressed="false">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 22c3.9 0 7-2.9 7-6.7 0-2.4-1.3-4.5-3.4-6.7-.8 2.3-2.2 3.7-3.6 4.4.6-3.2-.8-6.1-3.4-8.7C8.2 7.5 5 10 5 15.3 5 19.1 8.1 22 12 22Z" />
              </svg>
            </button>
            <button class="mode-action mode-action-freezer" id="freezerButton" type="button" aria-label="냉장고 켜기" aria-pressed="false">
              <svg aria-hidden="true" viewBox="0 0 24 24">
                <path d="M12 2v20" />
                <path d="M4.9 4.9 19.1 19.1" />
                <path d="M19.1 4.9 4.9 19.1" />
                <path d="m8 4 4 4 4-4" />
                <path d="m8 20 4-4 4 4" />
                <path d="m4 8 4 4-4 4" />
                <path d="m20 8-4 4 4 4" />
              </svg>
            </button>
          </div>
          <p class="freezer-warning" id="freezerWarning" role="status" aria-live="assertive">위험! 곧 얼음이 다시 얼어요!</p>
        </div>

        <button class="ice-stage" id="iceStage" type="button" aria-label="얼음을 탭하면 작은 물결이 생깁니다">
          <span class="melt-scene" aria-hidden="true">
            <canvas id="iceCanvas" class="melt-frame" width="720" height="720"></canvas>
          </span>
        </button>

        <div class="duration-panel" aria-label="시간 설정">
          <label class="custom-time">
            <input id="customMinutes" type="number" inputmode="numeric" min="1" max="180" value="25" aria-label="공부 시간(분)" />
            <span>분</span>
          </label>
        </div>

        <div class="actions">
          <button class="primary-action" id="startPauseButton" type="button">시작</button>
          <button class="secondary-action icon-action" id="resetButton" type="button" aria-label="다시 시작">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M3 12a9 9 0 1 0 3-6.7" />
              <path d="M3 4v5h5" />
            </svg>
          </button>
        </div>
        <p class="completion-status" id="completionStatus" role="status" aria-live="polite"></p>
      </section>
    </main>

    <script src="script.js?v=20260516-canvas-1"></script>
  </body>
</html>
